<div class="card card-tariff @@if (cardType === 'tariff-popular'){tariff-popular}">
    @@if (cardType === 'tariff-popular'){
        <div class="popular-label small">Популярный тариф</div>
    }
    <div class="card-body">
        <div class="d-flex flex-column justify-content-between h-100">
            <div class="mb-10">
                <div class="card-title h5 fw-600">@@title</div>
                <div class="text-gray-50 mb-0">@@description</div>
            </div>
            <div>
                <div class="fw-500 mb-7">@@generations</div>
                <div class="d-flex flex-wrap gap-2 mb-1">
                    <div class="text-gray-50 fw-500 text-decoration-line-through">@@oldPrice</div>
                    <div class="divider-vertical h-20px"></div>
                    <div class="text-gray-50 fw-500">@@profit</div>
                </div>
                <div class="d-flex flex-wrap align-items-end gap-4">
                    <div class="d-flex flex-wrap align-items-baseline gap-1">
                        <div class="h2 fw-700 mb-0">@@mainPrice</div>
                        <div class="text-gray-50 fw-500">/Мес</div>
                    </div>
                    <div class="bg-success-200 text-success-700 rounded-1 small fw-500 py-1 px-2">@@percent</div>
                </div>
            </div>
        </div>
    </div>
    <div class="card-footer">
        @@if (cardType === 'tariff-common'){
            <button type="button" class="btn btn-primary w-100">@@btnTitle</button>
        }
        @@if (cardType === 'tariff-popular'){
            <button type="button" class="btn px-0 w-100 disabled">@@btnTitle</button>
        }
    </div>
</div>

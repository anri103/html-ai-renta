<div class="modal fade" id="modalEstateCardRepeat" aria-hidden="true" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-body">

                <!-- icon + btn-close -->
                <div class="d-flex justify-content-between gap-3 mb-2">
                    <img src="assets/img/modals/repeat.svg" alt="repeat">
                    <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <!-- title -->
                <div class="h2 fw-700 mb-2">Повторить экономический паспорт</div>

                <!-- text -->
                <div class="text-box text-gray-50">
                    <p>Чек-лист будет заполнен данными из текущего паспорта. Измените нужные параметры и создайте новый экономический паспорт для похожего объекта</p>
                    <p style="color: #334155; font-weight: 500;">Это удобно, если объекты похожи и отличаются только отдельными характеристиками</p>
                </div>

                <!-- buttons -->
                <div class="d-flex flex-wrap gap-2 mt-6">
                    <button type="button" class="btn btn-outline-secondary w-100 w-sm-auto" data-coreui-dismiss="modal">Отмена</button>
                    <a href="@@if (userRole === 'seller') {seller-add-new-object.html} @@if (userRole === 'investor') {investor-add-new-object.html}" class="btn btn-primary w-100 w-sm-auto">
                        <span>Повторить</span>
                        <svg class="flex-shrink-0 ms-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M4 12V9C4 8.20435 4.31607 7.44129 4.87868 6.87868C5.44129 6.31607 6.20435 6 7 6H20M17 9L20 6L17 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M20 12V15C20 15.7956 19.6839 16.5587 19.1213 17.1213C18.5587 17.6839 17.7957 18 17 18H4M7 15L4 18L7 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<div class="modal modal-forgot-pass fade" id="modalForgotPass1" aria-hidden="true" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-body">

                <!-- btn-close -->
                <div class="d-flex justify-content-between gap-3 mb-6">
                    <div class="h2 fw-700 mb-0">Укажите электронную почту, на которую вы регистрировались</div>
                    <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
                </div>

                <!-- text -->
                <div>
                    <form  class="needs-validation" novalidate>
                        <div class="mb-6">
                            <div class="position-relative has-validation">
                                <div class="position-relative">
                                    <!-- icon -->
                                    <div class="position-absolute top-50 start-0 translate-middle-y mx-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                                            <path d="M4 6L10.1076 10.6123L10.1097 10.614C10.7878 11.1113 11.1271 11.3601 11.4988 11.4562C11.8272 11.5412 12.1725 11.5412 12.501 11.4562C12.8729 11.36 13.2132 11.1105 13.8926 10.6123C13.8926 10.6123 17.8101 7.60594 20 6M3 15.8002V8.2002C3 7.08009 3 6.51962 3.21799 6.0918C3.40973 5.71547 3.71547 5.40973 4.0918 5.21799C4.51962 5 5.08009 5 6.2002 5H17.8002C18.9203 5 19.4796 5 19.9074 5.21799C20.2837 5.40973 20.5905 5.71547 20.7822 6.0918C21 6.5192 21 7.07899 21 8.19691V15.8036C21 16.9215 21 17.4805 20.7822 17.9079C20.5905 18.2842 20.2837 18.5905 19.9074 18.7822C19.48 19 18.921 19 17.8031 19H6.19691C5.07899 19 4.5192 19 4.0918 18.7822C3.71547 18.5905 3.40973 18.2842 3.21799 17.9079C3 17.4801 3 16.9203 3 15.8002Z" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </div>
                                    <!-- field -->
                                    <input type="email" class="form-control ps-10" placeholder="Электронная почта" id="inputEmailForgotPass1" required>
                                </div>
                                <!-- validation feedbacks -->
                                <div class="form-feedback feedback-warning">
                                    <div class="text-center fw-500 mb-3">Этот&nbsp;адрес электронной почты уже&nbsp;зарегистрирован</div>
                                    <a href="sign-in.html" class="btn btn-primary w-100">Войти</a>
                                </div>
                                <div class="form-feedback feedback-error">Неверный формат электронной почты</div>
                            </div>
                        </div>
                        <!-- submit btn wrp -->
                        <div>
                            <button type="button" class="btn btn-primary w-100" data-coreui-toggle="modal" data-coreui-target="#modalForgotPass2">Восстановить пароль</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
